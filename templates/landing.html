<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillPal - Your Health Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing-card {
            background: white;
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        .logo-container {
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 80px;
            color: #667eea;
        }
        .brand-name {
            font-size: 48px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }
        .tagline {
            color: #666;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .enter-btn {
            padding: 15px 50px;
            font-size: 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .features {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .feature-item {
            text-align: center;
        }
        .feature-icon {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 5px;
        }
        .feature-text {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="landing-card">
        <div class="logo-container">
            <i class="bi bi-capsule logo-icon"></i>
        </div>
        <h1 class="brand-name">PillPal</h1>
        <p class="tagline">Your Complete Healthcare Management System</p>
        <a href="{{ url_for('auth.login') }}" class="enter-btn">
            <i class="bi bi-box-arrow-in-right me-2"></i>Enter PillPal
        </a>
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon"><i class="bi bi-clipboard2-pulse"></i></div>
                <div class="feature-text">Prescriptions</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="bi bi-calendar-check"></i></div>
                <div class="feature-text">Appointments</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="bi bi-file-earmark-medical"></i></div>
                <div class="feature-text">Lab Tests</div>
            </div>
        </div>
    </div>
</body>
</html>
